version: "3.8"

services:
  download:
    build: .
    command: python download_dataset.py
    volumes:
      - ./data:/app/data
      - ~/.kaggle:/root/.kaggle:ro
    environment:
      - PYTHONUNBUFFERED=1

  train_unet:
    build: .
    command: python code_ml.py
    volumes:
      - ./data:/app/data
      - ./outputs_unet:/app/outputs_unet
      - ./models:/app/models
      - ~/.kaggle:/root/.kaggle:ro
    environment:
      - PYTHONUNBUFFERED=1
      - BUSI_DATASET_DIR=/app/data/raw/Dataset_BUSI_with_GT
      - OUTPUT_DIR=/app/outputs_unet
      - MODEL_DIR=/app/models
    depends_on:
      - download

  train_classifier:
    build: .
    command: python code_classifier.py
    volumes:
      - ./data:/app/data
      - ./outputs_classifier:/app/outputs_classifier
      - ./models:/app/models
      - ~/.kaggle:/root/.kaggle:ro
    environment:
      - PYTHONUNBUFFERED=1
      - BUSI_DATASET_DIR=/app/data/raw/Dataset_BUSI_with_GT
      - CLASSIFIER_EPOCHS=20
    depends_on:
      - download

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - train_unet
      - train_classifier

  jupyter:
    build: .
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./outputs_unet:/app/outputs_unet
      - ./outputs_classifier:/app/outputs_classifier
      - ./models:/app/models
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - BUSI_DATASET_DIR=/app/data/raw/Dataset_BUSI_with_GT
      - OUTPUT_DIR=/app/outputs_unet
      - MODEL_DIR=/app/models
