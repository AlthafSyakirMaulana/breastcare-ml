version: "3.8"

services:
  train:
    build: .
    command: python code_ml.py
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ~/.kaggle:/root/.kaggle:ro
    environment:
      - PYTHONUNBUFFERED=1
      - BUSI_DATASET_DIR=/app/data/raw/Dataset_BUSI_with_GT
      - OUTPUT_DIR=/app/outputs
  jupyter:
    build: .
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=''
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - BUSI_DATASET_DIR=/app/data/raw/Dataset_BUSI_with_GT
      - OUTPUT_DIR=/app/outputs

  download:
    build: .
    command: python download_dataset.py
    volumes:
      - ./data:/app/data
      - ~/.kaggle:/root/.kaggle:ro
    environment:
      - PYTHONUNBUFFERED=1
